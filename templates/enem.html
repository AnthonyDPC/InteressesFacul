<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nota ENEM - InteressesFacul</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-zinc-100">
    <div class="max-w-2xl mx-auto p-8">
        <h1 class="text-4xl font-bold text-center mb-8">Sua nota do ENEM</h1>
        <p class="text-center text-zinc-400 mb-10">Digite sua média geral do ENEM (0 a 1000) pra comparar com as notas de corte dos cursos</p>

        <form method="POST" class="space-y-8">
            <div class="bg-zinc-900 p-10 rounded-3xl text-center">
                <label for="nota_enem" class="block text-2xl mb-6">Nota ENEM:</label>
                <input type="number" id="nota_enem" name="nota_enem" min="0" max="1000" step="0.01"
                       class="w-48 text-5xl text-center bg-zinc-800 border border-zinc-700 rounded-xl p-4 focus:outline-none focus:border-emerald-500"
                       placeholder="ex: 720.5" required>
            </div>

            <button type="submit" class="w-full bg-amber-500 hover:bg-amber-600 text-black font-bold py-6 text-2xl rounded-3xl">
                Registrar e Continuar →
            </button>
        </form>

        <p class="text-center text-zinc-500 mt-8 text-sm">Use a nota oficial do seu boletim ENEM (média ponderada das áreas + redação)</p>
    </div>
</body>
</html>
