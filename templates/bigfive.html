<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Big Five - InteressesFacul</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-zinc-100">
    <div class="max-w-3xl mx-auto p-8">
        <h1 class="text-4xl font-bold text-center mb-8">Teste Big Five • Personalidade</h1>
        <p class="text-center text-zinc-400 mb-10">Responda com sinceridade (1 = Discordo totalmente • 5 = Concordo totalmente)</p>

        <form method="POST" class="space-y-10">
            {% for i, (question, _) in questions %}
            <div class="bg-zinc-900 p-8 rounded-3xl">
                <p class="text-lg leading-relaxed mb-6">{{ question }}</p>
                <div class="grid grid-cols-5 gap-4">
                    {% for score in range(1,6) %}
                    <label class="flex flex-col items-center cursor-pointer">
                        <input type="radio" name="q{{ i }}" value="{{ score }}" class="peer hidden">
                        <div class="w-12 h-12 flex items-center justify-center text-2xl font-bold bg-zinc-800 peer-checked:bg-emerald-500 peer-checked:text-black rounded-2xl transition-all">
                            {{ score }}
                        </div>
                        <span class="text-xs mt-2 text-zinc-400">
                            {% if score == 1 %}Discordo totalmente{% elif score == 5 %}Concordo totalmente{% endif %}
                        </span>
                    </label>
                    {% endfor %}
                </div>
            </div>
            {% endfor %}

            <button type="submit" 
                    class="w-full bg-emerald-500 hover:bg-emerald-600 text-black font-bold py-6 text-2xl rounded-3xl transition-all">
                Concluir Big Five →
            </button>
        </form>
    </div>
</body>
</html>
