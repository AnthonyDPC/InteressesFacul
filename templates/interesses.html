<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interesses RIASEC - InteressesFacul</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-zinc-100">
    <div class="max-w-3xl mx-auto p-8">
        <h1 class="text-4xl font-bold text-center mb-8">Teste de Interesses • RIASEC</h1>
        <p class="text-center text-zinc-400 mb-10">Quanto você gosta de fazer isso? (1-5)</p>

        <form method="POST" class="space-y-8">
            {% for i, question in questions %}
            <div class="bg-zinc-900 p-6 rounded-3xl">
                <p class="text-lg mb-4">{{ question }}</p>
                <div class="flex justify-between gap-3">
                    {% for score in range(1,6) %}
                    <label class="flex-1 text-center">
                        <input type="radio" name="q{{ i }}" value="{{ score }}" class="peer hidden">
                        <div class="py-4 rounded-2xl bg-zinc-800 peer-checked:bg-pink-500 peer-checked:text-black font-bold transition">
                            {{ score }}
                        </div>
                    </label>
                    {% endfor %}
                </div>
            </div>
            {% endfor %}

            <button type="submit" class="w-full bg-pink-500 hover:bg-pink-600 text-black font-bold py-6 text-2xl rounded-3xl">
                Concluir Interesses →
            </button>
        </form>
    </div>
</body>
</html>
