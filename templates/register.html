<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account • CareerFit</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            background: #fbfbfd;
            color: #1d1d1f;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 420px;
            width: 100%;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 24px;
            padding: 48px 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08), 0 2px 8px rgba(0,0,0,0.06);
            text-align: center;
        }
        h1 {
            font-size: 36px;
            font-weight: 600;
            letter-spacing: -0.015em;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #1d1d1f 0%, #424245 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            font-size: 17px;
            color: #6e6e73;
            margin-bottom: 40px;
        }
        .flash {
            padding: 14px 20px;
            border-radius: 14px;
            margin: 20px 0;
            font-size: 15px;
            font-weight: 500;
        }
        .flash.success { background: #d1f4e0; color: #0f5132; }
        .flash.danger  { background: #ffe5e5; color: #9b1d1d; }
        .flash.info    { background: #e3f2ff; color: #0071e3; }

        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 16px 18px;
            margin: 12px 0;
            border: 1.5px solid #d2d2d7;
            border-radius: 14px;
            font-size: 17px;
            transition: all 0.2s ease;
            background: #ffffff;
        }
        input:focus {
            outline: none;
            border-color: #0071e3;
            box-shadow: 0 0 0 4px rgba(0,113,227,0.15);
        }
        button {
            width: 100%;
            padding: 16px;
            margin-top: 16px;
            background: #0071e3;
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(0,113,227,0.25);
        }
        button:hover {
            background: #0077ed;
            transform: translateY(-1px);
        }
        button:active {
            background: #006edb;
            transform: translateY(0);
        }
        .links {
            margin-top: 32px;
            font-size: 15px;
            color: #6e6e73;
        }
        .links a {
            color: #0071e3;
            text-decoration: none;
            font-weight: 500;
        }
        .links a:hover { text-decoration: underline; }

        @media (prefers-color-scheme: dark) {
            body { background: #000000; }
            .container {
                background: #1d1d1f;
                box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            }
            h1 {
                background: linear-gradient(90deg, #f5f5f7 0%, #d2d2d7 100%);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
            }
            .subtitle { color: #a1a1a6; }
            input[type="email"],
            input[type="password"] {
                background: #2d2d2f;
                border-color: #424245;
                color: #f5f5f7;
            }
            input:focus {
                border-color: #0a84ff;
                box-shadow: 0 0 0 4px rgba(10,132,255,0.25);
            }
            button {
                background: #0a84ff;
                box-shadow: 0 4px 12px rgba(10,132,255,0.3);
            }
            button:hover { background: #0d8bff; }
            .flash.success { background: #1a3d2b; color: #66ff99; }
            .flash.danger  { background: #3d1f1f; color: #ff6b6b; }
            .flash.info    { background: #1a3a52; color: #66b3ff; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Create Account</h1>
        <p class="subtitle">Join CareerFit and save your results forever</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="flash {{ category }}">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <input type="email" name="email" placeholder="Email address" required autocomplete="email">
            <input type="password" name="password" placeholder="Password (6+ characters)" required autocomplete="new-password" minlength="6">
            <button type="submit">Create Account</button>
        </form>

        <div class="links">
            Already have an account? <a href="/login">Log in here</a><br><br>
            <a href="/">← Back to home</a>
        </div>
    </div>
</body>
</html>
