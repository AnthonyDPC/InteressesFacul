<!DOCTYPE html><html><head><title>Login • CareerFit</title><style>/* Your beautiful style */</style></head>
<body>
<div class="container">
    <h1>Log In</h1>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}{% for cat, msg in messages %}
        <div style="padding:12px;background:#ff3b30;color:white;border-radius:12px;margin:20px 0">{{ msg }}</div>
      {% endfor %}{% endif %}
    {% endwith %}
    <form method="POST" style="margin-top:32px">
        <input type="email" name="email" placeholder="Email" required style="width:100%;padding:16px;margin:12px 0;border-radius:12px;border:1px solid #d2d2d7;font-size:17px">
        <input type="password" name="password" placeholder="Password" required style="width:100%;padding:16px;margin:12px 0;border-radius:12px;border:1px solid #d2d2d7;font-size:17px">
        <button type="submit" class="btn primary" style="width:100%;padding:16px;margin-top:20px">Log In</button>
    </form>
    <p style="text-align:center;margin-top:24px">
        No account? <a href="/register" style="color:#0071e3">Register here</a>
    </p>
    <p style="text-align:center"><a href="/">← Back to home</a></p>
</div>
</body></html>
