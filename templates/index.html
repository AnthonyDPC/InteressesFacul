<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InteressesFacul</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">
    <div class="max-w-2xl mx-auto pt-12 px-6">
        <div class="text-center mb-12">
            <h1 class="text-6xl font-bold text-emerald-400 mb-3">InteressesFacul</h1>
            <p class="text-2xl text-zinc-400">Descubra seu curso ideal em 3 testes rápidos</p>
        </div>

        <div class="grid gap-6">
            <a href="/bigfive" 
               class="group bg-zinc-900 hover:bg-zinc-800 p-8 rounded-3xl flex items-center justify-between transition-all">
                <div>
                    <div class="flex items-center gap-4">
                        <i class="fa-solid fa-brain text-4xl text-blue-400"></i>
                        <div>
                            <h2 class="text-2xl font-semibold">1. Big Five</h2>
                            <p class="text-zinc-400">Personalidade (50 perguntas)</p>
                        </div>
                    </div>
                </div>
                <i class="fa-solid fa-arrow-right text-3xl group-hover:translate-x-2 transition"></i>
            </a>

            <a href="/interesses" 
               class="group bg-zinc-900 hover:bg-zinc-800 p-8 rounded-3xl flex items-center justify-between transition-all">
                <div>
                    <div class="flex items-center gap-4">
                        <i class="fa-solid fa-heart text-4xl text-pink-400"></i>
                        <div>
                            <h2 class="text-2xl font-semibold">2. Interesses (RIASEC)</h2>
                            <p class="text-zinc-400">30 perguntas sobre o que você gosta</p>
                        </div>
                    </div>
                </div>
                <i class="fa-solid fa-arrow-right text-3xl group-hover:translate-x-2 transition"></i>
            </a>

            <a href="/enem" 
               class="group bg-zinc-900 hover:bg-zinc-800 p-8 rounded-3xl flex items-center justify-between transition-all">
                <div>
                    <div class="flex items-center gap-4">
                        <i class="fa-solid fa-lightbulb text-4xl text-amber-400"></i>
                        <div>
                            <h2 class="text-2xl font-semibold">3. ENEM</h2>
                        </div>
                    </div>
                </div>
                <i class="fa-solid fa-arrow-right text-3xl group-hover:translate-x-2 transition"></i>
            </a>
        </div>

        <div class="mt-12 text-center">
            {% if progress == 3 %}
            <a href="/final" class="inline-block bg-emerald-500 hover:bg-emerald-600 text-black font-bold text-2xl px-16 py-6 rounded-3xl transition-all">
                🎉 VER MINHAS RECOMENDAÇÕES FINAIS
            </a>
            {% else %}
            <p class="text-zinc-500 text-xl">Progresso: <span class="font-bold text-emerald-400">{{ progress }}/3</span></p>
            {% endif %}
        </div>
    </div>
</body>
</html>
